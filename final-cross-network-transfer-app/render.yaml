services:
  - type: web
    name: cross-network-transfer-app
    runtime: node
    nodeVersion: "20"
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: STORAGE_ROOT
        value: /opt/render/project/src/storage
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: MAX_HISTORY_PER_ROOM
        value: 200
      - key: MESSAGE_RETENTION_COUNT
        value: 5000
